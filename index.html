<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Compare Traficar pricing plans — Standard, Hourly, and Daily — for Renault Clio V and Arkana. Enter your trip details and find the cheapest option instantly.">
    <meta name="keywords" content="Traficar, carsharing, calculator, Renault Clio, Renault Arkana, pricing, Poland, car rental cost">
    <meta property="og:title" content="Traficar Ride Cost Calculator">
    <meta property="og:description" content="Find the cheapest Traficar pricing plan for your trip. Compare Standard, Hourly, and Daily rates for Clio V and Arkana.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://traficar-calculator.pages.dev/">
    <title>Traficar Ride Cost Calculator — Find the Cheapest Plan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f0ff 0%, #ede7f6 50%, #e8eaf6 100%);
            color: #1a1a2e;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 16px;
        }

        .container {
            background: white;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(140, 36, 168, 0.08), 0 1px 3px rgba(0, 0, 0, 0.06);
            max-width: 420px;
            width: 100%;
            align-self: flex-start;
        }

        h1 {
            text-align: center;
            color: #7b1fa2;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }

        .hint {
            font-size: 11px;
            color: #999;
            font-weight: normal;
            margin-left: 3px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #9c27b0;
            box-shadow: 0 0 0 3px rgba(156, 39, 176, 0.1);
            background: white;
        }

        input.input-error {
            border-color: #e53935;
            box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.1);
        }

        .time-inputs {
            display: flex;
            gap: 10px;
        }

        .stop-section {
            border-top: 1px dashed #e0e0e0;
            padding-top: 20px;
            margin-top: 4px;
        }

        .error-message {
            color: #e53935;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #9c27b0 0%, #7b1fa2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.3);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(156, 39, 176, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 28px;
        }

        .car-result {
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 16px;
            border: 1px solid #eee;
            transition: box-shadow 0.2s;
        }

        .car-result:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .car-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #1a1a2e;
        }

        .price {
            font-size: 28px;
            font-weight: 700;
            margin: 8px 0;
            color: #7b1fa2;
        }

        .breakdown {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .breakdown-title {
            font-weight: 600;
            color: #555;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .offer-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 12px;
            border-radius: 8px;
            background: white;
            border: 1px solid #eee;
        }

        .offer-row.is-best {
            border-color: #c8e6c9;
            background: #f1f8e9;
        }

        .offer-row.is-best .offer-price {
            color: #2e7d32;
        }

        .offer-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .offer-name {
            font-weight: 600;
            font-size: 13px;
            color: #333;
        }

        .offer-math {
            font-size: 11px;
            color: #999;
            font-family: monospace;
        }

        .offer-price {
            font-weight: 700;
            font-size: 15px;
            color: #555;
            white-space: nowrap;
            padding-left: 12px;
            align-self: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Traficar Calculator</h1>
        <p class="subtitle">Enter your trip details to compare Standard, Hourly, and Daily pricing plans and find the cheapest option.</p>

        <div class="form-group">
            <label for="distance">Total Distance <span class="hint">(km)</span></label>
            <input type="number" id="distance" placeholder="e.g. 25" min="0" step="0.1">
        </div>

        <div class="form-group">
            <label>Total Rental Time <span class="hint">(Start to Finish)</span></label>
            <div class="time-inputs">
                <input type="number" id="tHours" placeholder="Hours" min="0">
                <input type="number" id="tMins" placeholder="Minutes" min="0" max="59">
            </div>
            <div class="error-message" id="rentTimeError">Please enter the rental time.</div>
        </div>

        <div class="form-group stop-section">
            <label>Stop Time <span class="hint">(Included in rental time, default 0)</span></label>
            <div class="time-inputs">
                <input type="number" id="sHours" placeholder="0" min="0">
                <input type="number" id="sMins" placeholder="0" min="0" max="59">
            </div>
        </div>

        <button onclick="calculateCost()">Find Optimal Ride</button>

        <div class="results" id="results" style="display: none;">
            <div class="car-result" id="clio-result"></div>
            <div class="car-result" id="arkana-result"></div>
        </div>
    </div>

    <script>
        function generateOfferData(name, total, mathString) {
            return { name, total, mathString };
        }

        function clearErrors() {
            document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
        }

        function calculateCost() {
            clearErrors();

            const km = parseFloat(document.getElementById('distance').value) || 0;
            const tHours = parseInt(document.getElementById('tHours').value) || 0;
            const tMins = parseInt(document.getElementById('tMins').value) || 0;
            const sHours = parseInt(document.getElementById('sHours').value) || 0;
            const sMins = parseInt(document.getElementById('sMins').value) || 0;

            const totalHoursDecimal = tHours + (tMins / 60);
            const stopMins = (sHours * 60) + sMins;

            let hasError = false;

            if (totalHoursDecimal === 0) {
                document.getElementById('tHours').classList.add('input-error');
                document.getElementById('tMins').classList.add('input-error');
                document.getElementById('rentTimeError').style.display = 'block';
                hasError = true;
            }

            if (hasError) return;

            const blocks3h = Math.max(1, Math.ceil(totalHoursDecimal / 3));
            const blocks24h = Math.max(1, Math.ceil(totalHoursDecimal / 24));

            // --- CLIO ---
            let clioKm = generateOfferData("Standard Rate", 4.99 + (km * 2.29) + (stopMins * 0.30), `Start Fee (4.99) + ${km}km*(2.29) + ${stopMins}min Stop*(0.30)`);
            let clioHour = generateOfferData("Hourly (3h)", (blocks3h * 14.99) + (km * 1.69), `${blocks3h}*3h-Block(14.99) + ${km}km*(1.69)`);
            let clioDay = generateOfferData("Daily (24h)", (blocks24h * 69.00) + (km * 1.39), `${blocks24h}*24h-Block(69.00) + ${km}km*(1.39)`);
            let clioOffers = [clioKm, clioHour, clioDay].sort((a, b) => a.total - b.total);

            // --- ARKANA ---
            let arkKm = generateOfferData("Standard Rate", 5.99 + (km * 2.60) + (stopMins * 0.30), `Start Fee (5.99) + ${km}km*(2.60) + ${stopMins}min Stop*(0.30)`);
            let arkHour = generateOfferData("Hourly (3h)", (blocks3h * 19.99) + (km * 2.09), `${blocks3h}*3h-Block(19.99) + ${km}km*(2.09)`);
            let arkDay = generateOfferData("Daily (24h)", (blocks24h * 99.00) + (km * 1.49), `${blocks24h}*24h-Block(99.00) + ${km}km*(1.49)`);
            let arkOffers = [arkKm, arkHour, arkDay].sort((a, b) => a.total - b.total);

            document.getElementById('results').style.display = 'block';

            function renderResults(carName, offers) {
                let output = `<div class="car-name">${carName}</div>`;
                output += `<div class="price">${offers[0].total.toFixed(2)} PLN</div>`;
                output += `<div class="breakdown"><div class="breakdown-title">All options</div>`;

                offers.forEach((opt, i) => {
                    const best = i === 0 ? ' is-best' : '';
                    output += `<div class="offer-row${best}">`;
                    output += `<div class="offer-left">`;
                    output += `<span class="offer-name">${opt.name}${i === 0 ? ' ✓' : ''}</span>`;
                    output += `<span class="offer-math">${opt.mathString}</span>`;
                    output += `</div>`;
                    output += `<span class="offer-price">${opt.total.toFixed(2)} PLN</span>`;
                    output += `</div>`;
                });
                output += `</div>`;
                return output;
            }

            document.getElementById('clio-result').innerHTML = renderResults("RENAULT Clio V", clioOffers);
            document.getElementById('arkana-result').innerHTML = renderResults("RENAULT Arkana", arkOffers);
        }
    </script>

</body>

</html>
